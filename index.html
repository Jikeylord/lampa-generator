<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 Lamp Generator 3D</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Подключаем Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Панель управления -->
        <aside class="controls-panel">
            <header class="panel-header">
                <h1>🔧 Генератор Ламп</h1>
                <div class="action-buttons">
                    <button id="btn-random">🎲 Рандом</button>
                    <button id="btn-reset">↺ Сброс</button>
                    <button id="btn-export"> Скачать STL</button>
                </div>
            </header>

            <!-- Пресеты -->
            <section class="presets-section">
                <h3>Пресеты</h3>
                <div class="presets-grid">
                    <button class="preset-btn" data-preset="classic">🏛 Классика</button>
                    <button class="preset-btn" data-preset="spiral">🌀 Спираль</button>
                    <button class="preset-btn" data-preset="geometry">🔷 Геометрия</button>
                    <button class="preset-btn" data-preset="modern">⬜ Модерн</button>
                </div>
            </section>

            <!-- Настройки -->
            <section class="params-section">
                <details open>
                    <summary>🔷 Форма лампы</summary>
                    <div class="param-group">
                        <label>Высота корпуса
                            <input type="range" id="param-height" min="50" max="300" value="150">
                            <span id="val-height">150</span>
                        </label>
                        <label>Радиус дна
                            <input type="range" id="param-radius-bottom" min="20" max="100" value="40">
                            <span id="val-radius-bottom">40</span>
                        </label>
                        <label>Радиус верха
                            <input type="range" id="param-radius-top" min="10" max="80" value="30">
                            <span id="val-radius-top">30</span>
                        </label>
                        <label>Плавность (сегменты)
                            <input type="range" id="param-segments" min="8" max="64" value="32">
                            <span id="val-segments">32</span>
                        </label>
                        <label>Сужение в центре
                            <input type="range" id="param-curvature" min="-50" max="50" value="10">
                            <span id="val-curvature">10</span>
                        </label>
                    </div>
                </details>

                <details open>
                    <summary>✨ Детали</summary>
                    <div class="param-group">
                        <label>Тип узора
                            <select id="param-pattern">
                                <option value="smooth">Гладкая</option>
                                <option value="waves">Волны</option>
                                <option value="twist">Спираль</option>
                                <option value="hex">Шестиугольники</option>
                            </select>
                        </label>
                        <label>Глубина узора
                            <input type="range" id="param-depth" min="0" max="3" step="0.1" value="0.5">
                            <span id="val-depth">0.5</span>
                        </label>
                    </div>
                </details>
            </section>

            <section class="info-section">
                <p>Статус: <span id="status-text">Готово</span></p>
            </section>
        </aside>

        <!-- 3D окно -->
        <main class="viewport-container">
            <div id="viewport"></div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
